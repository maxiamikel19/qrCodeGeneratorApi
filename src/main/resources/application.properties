spring.application.name=qrCodeGeneratorApi
# Nome do banco em memória
spring.datasource.url=jdbc:postgresql://localhost:5432/qrcodeDb

# Driver do H2
spring.datasource.driver-class-name=org.postgresql.Driver

# Usuário e senha (padrão do H2)
spring.datasource.username=dev
spring.datasource.password=dev1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Dialeto do Hibernate para H2
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

